version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ojek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ojek_delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ojek-network

  # Redis for session storage and caching
  redis:
    image: redis:7-alpine
    container_name: ojek-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ojek-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ojek-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ojek_delivery_db
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-key-here
      GOOGLE_MAPS_API_KEY: your-google-maps-api-key
      FIREBASE_PROJECT_ID: your-firebase-project-id
      FIREBASE_PRIVATE_KEY: your-firebase-private-key
      FIREBASE_CLIENT_EMAIL: your-firebase-client-email
      VAPID_PUBLIC_KEY: your-vapid-public-key
      VAPID_PRIVATE_KEY: your-vapid-private-key
      VAPID_EMAIL: your-email@example.com
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - ojek-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ojek-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - ojek-network

volumes:
  postgres_data:
  redis_data:

networks:
  ojek-network:
    driver: bridge
